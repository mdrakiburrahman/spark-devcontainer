name: Test Devcontainer

on:
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: rakirahman.azurecr.io
          username: rakirahman
          password: ${{ secrets.ACR_PASSWORD }}
      
      - name: Setup Docker
        run: |
          sudo chmod 666 /var/run/docker.sock
          docker version
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run devcontainer tests
        run: npx nx run devcontainer:test --verbose
      
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_number }}
          path: logs/test-runs/
          retention-days: 7
