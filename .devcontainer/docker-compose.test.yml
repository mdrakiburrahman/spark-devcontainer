version: '3.8'

services:
  devcontainer-test:
    image: rakirahman.azurecr.io/devcontainer/spark:f19152fee6ca1309989e1b0b81bc52519e7de1e195320f0297c8aac3a9df54ab
    container_name: spark-devcontainer-test
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    volumes:
      - /tmp/test-workspace:/workspace
      - /dev/fuse:/dev/fuse:rw
    working_dir: /workspace
    user: vscode
    command: sleep infinity
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/overlay/post-create-commands.sh"]
      interval: 5s
      timeout: 3s
      retries: 3
